version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm ci
        - npm run validate
    build:
      commands:
        - rm -f .env.production
        - env | grep -e '^FAMILY_' -e '^CANONICAL_HOST=' -e '^NEXT_PUBLIC_SITE_URL=' >> .env.production
        - echo "AWS_REGION=${AWS_REGION:-us-west-2}" >> .env.production
        - echo "NODE_ENV=production" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
